function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rrange = (rng, a, b) => a + rng() * (b - a);
const D2R = Math.PI / 180;
const normDeg = (d) => ((d % 360) + 360) % 360;
function inArc(angle, from, to) {
  const a = normDeg(angle), f = normDeg(from), t = normDeg(to);
  return f <= t ? a >= f && a <= t : a >= f || a <= t;
}
function polarToXY(cx, cy, angleDeg, radiusPx) {
  return { x: cx + radiusPx * Math.cos(angleDeg * D2R), y: cy - radiusPx * Math.sin(angleDeg * D2R) };
}

function drawHydrangea(ctx, rng, size) {
  const R = size / 2;
  for (let i = 0; i < 54; i++) {
    const rr = Math.sqrt(rng()) * R * 0.92, aa = rng() * Math.PI * 2;
    const fx = Math.cos(aa) * rr, fy = Math.sin(aa) * rr * 0.94;
    const fr = R * rrange(rng, 0.13, 0.19);
    const mix = rrange(rng, 0, 1) * 0.5 + (rr / R) * 0.5;
    const c = [205 - mix * 24, 218 - mix * 20, 236 - mix * 12];
    ctx.save(); ctx.translate(fx, fy); ctx.rotate(rng() * Math.PI);
    for (let p = 0; p < 4; p++) {
      ctx.rotate(Math.PI / 2);
      const g = ctx.createRadialGradient(0, -fr * 0.55, 0, 0, -fr * 0.55, fr * 0.8);
      g.addColorStop(0, "rgb(" + (c[0] + 18) + "," + (c[1] + 14) + "," + (c[2] + 10) + ")");
      g.addColorStop(1, "rgb(" + (c[0] - 14) + "," + (c[1] - 10) + "," + (c[2] - 4) + ")");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(0, -fr * 0.55, fr * 0.46, fr * 0.62, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = "rgba(122,144,178,0.9)";
    ctx.beginPath(); ctx.arc(0, 0, fr * 0.13, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}
function drawRanunculus(ctx, rng, size) {
  const R = size / 2;
  for (let L = 8; L >= 1; L--) {
    const lr = R * (L / 8), petals = 6 + L * 2, tone = 1 - L / 8;
    const base = [243 - tone * 6, 238 - tone * 4, 226 + tone * 14];
    const rot = rng() * Math.PI * 2;
    for (let p = 0; p < petals; p++) {
      const pa = rot + (p / petals) * Math.PI * 2;
      ctx.save();
      ctx.translate(Math.cos(pa) * lr * 0.55, Math.sin(pa) * lr * 0.55);
      ctx.rotate(pa + Math.PI / 2);
      const g = ctx.createLinearGradient(0, -lr * 0.5, 0, lr * 0.3);
      g.addColorStop(0, "rgb(" + base[0] + "," + base[1] + "," + base[2] + ")");
      g.addColorStop(1, "rgba(" + (base[0] - 26) + "," + (base[1] - 26) + "," + (base[2] - 28) + ",0.95)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(0, 0, lr * 0.42, lr * 0.55, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(170,158,134,0.25)"; ctx.lineWidth = size * 0.006; ctx.stroke();
      ctx.restore();
    }
  }
  ctx.fillStyle = "#cfd3b4"; ctx.beginPath(); ctx.arc(0, 0, R * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#9aa36f"; ctx.beginPath(); ctx.arc(0, 0, R * 0.035, 0, Math.PI * 2); ctx.fill();
}
function drawLisianthus(ctx, rng, size) {
  const R = size / 2, rot = rng() * Math.PI * 2;
  for (let p = 0; p < 6; p++) {
    ctx.save(); ctx.rotate(rot + (p / 6) * Math.PI * 2 + rrange(rng, -0.1, 0.1));
    const g = ctx.createLinearGradient(0, 0, R, 0);
    g.addColorStop(0, "#f8f5ee"); g.addColorStop(0.7, "#f2ecdf"); g.addColorStop(1, "#e6dcc9");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(R * 0.08, 0);
    ctx.bezierCurveTo(R * 0.35, -R * 0.5, R * 0.95, -R * 0.42, R * 0.98, -R * 0.04);
    ctx.bezierCurveTo(R * 1.0, R * 0.3, R * 0.5, R * 0.5, R * 0.08, R * 0.12);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(180,168,140,0.3)"; ctx.lineWidth = size * 0.007; ctx.stroke();
    ctx.restore();
  }
  for (let s = 0; s < 7; s++) {
    const sa = rng() * Math.PI * 2, sr = rng() * R * 0.12;
    ctx.fillStyle = s % 2 ? "#d6cf9a" : "#b8bd86";
    ctx.beginPath(); ctx.arc(Math.cos(sa) * sr, Math.sin(sa) * sr, R * 0.045, 0, Math.PI * 2); ctx.fill();
  }
}
function drawWaxflower(ctx, rng, size) {
  const R = size / 2;
  for (let b = 0; b < 6; b++) {
    const ba = rng() * Math.PI * 2, br = rng() * R * 0.8;
    const bx = Math.cos(ba) * br, by = Math.sin(ba) * br;
    ctx.strokeStyle = "rgba(110,122,92,0.8)"; ctx.lineWidth = size * 0.018;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(bx, by); ctx.stroke();
    const fr = R * rrange(rng, 0.18, 0.24);
    for (let p = 0; p < 5; p++) {
      const pa = (p / 5) * Math.PI * 2 + rng();
      ctx.fillStyle = "#faf8f2";
      ctx.beginPath();
      ctx.ellipse(bx + Math.cos(pa) * fr * 0.5, by + Math.sin(pa) * fr * 0.5, fr * 0.34, fr * 0.42, pa, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = "#c8b98f"; ctx.beginPath(); ctx.arc(bx, by, fr * 0.16, 0, Math.PI * 2); ctx.fill();
  }
}
function drawFoliageSprig(ctx, rng, size) {
  const len = size, bend = rrange(rng, -0.25, 0.25);
  ctx.strokeStyle = "#56603f"; ctx.lineWidth = size * 0.016;
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(len * 0.5, len * bend, len, len * bend * 1.6); ctx.stroke();
  for (let i = 1; i <= 9; i++) {
    const t = i / 10, sx = len * t;
    const sy = len * bend * (2 * t * (1 - t)) * 1.6 + len * bend * 1.6 * t * t;
    const side = i % 2 ? 1 : -1;
    const la = bend * 1.2 + side * rrange(rng, 0.7, 1.05);
    const ll = size * rrange(rng, 0.16, 0.24) * (1 - t * 0.35);
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(la);
    const g = ctx.createLinearGradient(0, 0, ll, 0);
    g.addColorStop(0, "#4A6741"); g.addColorStop(1, "#7a9468");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(ll * 0.5, 0, ll * 0.5, ll * 0.21, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(235,240,228,0.35)"; ctx.lineWidth = size * 0.006;
    ctx.beginPath(); ctx.moveTo(ll * 0.08, 0); ctx.lineTo(ll * 0.92, 0); ctx.stroke();
    ctx.restore();
  }
}
function drawEucalyptus(ctx, rng, size) {
  const len = size, bend = rrange(rng, -0.2, 0.2);
  ctx.strokeStyle = "#7d8a72"; ctx.lineWidth = size * 0.013;
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(len * 0.5, len * bend, len, len * bend * 1.5); ctx.stroke();
  for (let i = 1; i <= 8; i++) {
    const t = i / 9, sx = len * t;
    const sy = len * bend * (2 * t * (1 - t)) * 1.6 + len * bend * 1.5 * t * t;
    const side = i % 2 ? 1 : -1;
    const cr = size * rrange(rng, 0.07, 0.105) * (1 - t * 0.25);
    const cx2 = sx + side * cr * 1.1 * Math.abs(Math.sin(t * 4 + bend));
    const cy2 = sy + side * cr * 1.3;
    const g = ctx.createRadialGradient(cx2 - cr * 0.3, cy2 - cr * 0.3, 0, cx2, cy2, cr);
    g.addColorStop(0, "#b9c9b4"); g.addColorStop(1, "#94aa92");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx2, cy2, cr, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(120,138,118,0.5)"; ctx.lineWidth = size * 0.004; ctx.stroke();
  }
}

function drawGrapevine(ctx, cx, cy, rInner, rOuter, seed) {
  const rng = mulberry32(seed * 7919 + 13);
  const mid = (rInner + rOuter) / 2, band = (rOuter - rInner) / 2;
  const browns = ["#8b6f4e", "#6e563c", "#a08660", "#7c6244", "#94795a"];
  for (let i = 0; i < 150; i++) {
    const r = mid + rrange(rng, -band, band) * rrange(rng, 0.4, 1);
    const start = rng() * 360, span = rrange(rng, 35, 150);
    const wob = rrange(rng, -band * 0.35, band * 0.35);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rng() * 0.06 - 0.03);
    ctx.strokeStyle = browns[Math.floor(rng() * browns.length)];
    ctx.globalAlpha = rrange(rng, 0.22, 0.6);
    ctx.lineWidth = rrange(rng, 1.4, 3.6);
    ctx.beginPath();
    ctx.ellipse(0, 0, r + wob, r - wob, 0, -start * D2R, -(start + span) * D2R, true);
    ctx.stroke(); ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function prepareImage(img, orientDeg, stripWhite) {
  const rot = orientDeg % 360;
  const swap = rot === 90 || rot === 270;
  const w = swap ? img.naturalHeight : img.naturalWidth;
  const h = swap ? img.naturalWidth : img.naturalHeight;
  const cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  const ctx = cv.getContext("2d");
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rot * D2R);
  ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
  ctx.restore();
  if (stripWhite) {
    const id = ctx.getImageData(0, 0, w, h);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const lum = Math.min(d[i], d[i + 1], d[i + 2]);
      if (lum > 248) d[i + 3] = 0;
      else if (lum > 232) d[i + 3] = Math.min(d[i + 3], Math.round(((248 - lum) / 16) * 255));
    }
    ctx.putImageData(id, 0, 0);
  }
  return cv;
}
function makeSilhouette(sourceCanvas) {
  const cv = document.createElement("canvas");
  cv.width = sourceCanvas.width; cv.height = sourceCanvas.height;
  const ctx = cv.getContext("2d");
  ctx.drawImage(sourceCanvas, 0, 0);
  ctx.globalCompositeOperation = "source-in";
  ctx.fillStyle = "rgb(48,42,32)";
  ctx.fillRect(0, 0, cv.width, cv.height);
  return cv;
}
function makeProceduralSilhouette(ph) {
  const cam = ph.rotation_mode === "camera_facing";
  const cv = document.createElement("canvas");
  cv.width = cam ? 360 : 420; cv.height = cam ? 360 : 260;
  const ctx = cv.getContext("2d");
  ctx.save();
  if (cam) ctx.translate(180, 180); else ctx.translate(30, 130);
  ph.draw(ctx, mulberry32(777), 320);
  ctx.restore();
  ctx.globalCompositeOperation = "source-in";
  ctx.fillStyle = "rgb(48,42,32)";
  ctx.fillRect(0, 0, cv.width, cv.height);
  return cv;
}

function buildInstances(bp, opts) {
  const { canvasPx, jitter, globalScale, resolve } = opts;
  const cx = canvasPx / 2, cy = canvasPx / 2;
  const fieldIn = bp.canvas.diameter_in + 5;
  const pxPerIn = canvasPx / fieldIn;
  const wreathRadiusPx = (bp.canvas.diameter_in / 2) * pxPerIn;
  const silence = bp.silence_arcs || [];
  const instances = [], rejected = [];
  let idx = 0;
  const inSilence = (a) => silence.some((s) => inArc(a, s.from_deg, s.to_deg));

  (bp.foliage_sweeps || []).forEach((sw) => {
    const res = resolve(sw.item_id);
    if (!res) { rejected.push({ reason: "unresolved_sku", id: sw.item_id }); return; }
    for (let a = sw.arc_from; a <= sw.arc_to; a += sw.step_deg) {
      const rng = mulberry32(bp.seed * 9973 + idx * 271 + 7);
      const ang = normDeg(a + rrange(rng, -1, 1) * sw.step_deg * 0.35 * jitter);
      if (inSilence(ang)) { rejected.push({ reason: "silence_arc", id: sw.sweep_id }); idx++; continue; }
      const rad = sw.radius_norm + rrange(rng, -0.045, 0.045) * jitter;
      const pos = polarToXY(cx, cy, ang, rad * wreathRadiusPx);
      const tangent = -(ang * D2R) + (sw.flow === "cw" ? Math.PI / 2 : -Math.PI / 2);
      instances.push({
        idx, item_id: sw.item_id, res, x: pos.x, y: pos.y,
        rotation: tangent + rrange(rng, -0.3, 0.3) * jitter,
        sizePx: res.real_width_in * pxPerIn * globalScale * rrange(rng, 0.85, 1.12),
        mirror: rng() > 0.5, layer: res.layer_class,
        seedLocal: bp.seed * 9973 + idx * 271,
      });
      idx++;
    }
  });

  (bp.clusters || []).forEach((cl) => {
    cl.stems.forEach((stem) => {
      const res = resolve(stem.item_id);
      if (!res) { rejected.push({ reason: "unresolved_sku", id: stem.item_id }); return; }
      for (let q = 0; q < stem.qty; q++) {
        const rng = mulberry32(bp.seed * 9973 + idx * 271 + 7);
        const spread = stem.qty > 1 ? (q - (stem.qty - 1) / 2) * rrange(rng, 8, 13) : 0;
        const ang = normDeg(cl.angle_deg + spread + rrange(rng, -3, 3) * jitter);
        if (inSilence(ang)) { rejected.push({ reason: "silence_arc", id: cl.cluster_id }); idx++; continue; }
        const rad = cl.radius_norm + rrange(rng, -0.05, 0.05) * jitter;
        const pos = polarToXY(cx, cy, ang, rad * wreathRadiusPx);
        instances.push({
          idx, item_id: stem.item_id, res, x: pos.x, y: pos.y,
          rotation: res.rotation_mode === "camera_facing" ? rrange(rng, -0.26, 0.26) : -(ang * D2R) + Math.PI / 2,
          sizePx: res.real_width_in * pxPerIn * globalScale * rrange(rng, 0.92, 1.08),
          mirror: rng() > 0.5 && res.rotation_mode === "camera_facing",
          layer: res.layer_class,
          seedLocal: bp.seed * 9973 + idx * 271,
        });
        idx++;
      }
    });
  });

  instances.sort((a, b) => LAYER_ORDER.indexOf(a.layer) - LAYER_ORDER.indexOf(b.layer) || a.idx - b.idx);
  return { instances, rejected, pxPerIn, wreathRadiusPx, cx, cy };
}

function drawInstance(ctx, inst, mode) {
  const { res } = inst;
  if (res.kind === "image") {
    const src = mode === "sil" ? res.silhouette : res.prepared;
    if (!src) return;
    const W = inst.sizePx;
    const H = W * (res.prepared.height / res.prepared.width);
    ctx.drawImage(src, -res.anchor.x * W, -res.anchor.y * H, W, H);
  } else {
    if (mode === "sil") {
      const sil = res.silhouette;
      const cam = res.rotation_mode === "camera_facing";
      const sf = inst.sizePx / 320;
      if (cam) ctx.drawImage(sil, -180 * sf, -180 * sf, 360 * sf, 360 * sf);
      else ctx.drawImage(sil, -30 * sf, -130 * sf, 420 * sf, 260 * sf);
    } else {
      res.draw(ctx, mulberry32(inst.seedLocal + 3), inst.sizePx);
    }
  }
}

function renderComposite(canvas, bp, opts) {
  const { layersOn, showOverlay, showShadows, jitter, globalScale, lightAngle, resolve, sizePx } = opts;
  const SZ = sizePx || 1400;
  canvas.width = SZ; canvas.height = SZ;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#FCFBF8";
  ctx.fillRect(0, 0, SZ, SZ);

  const built = buildInstances(bp, { canvasPx: SZ, jitter, globalScale, resolve });
  const { instances, rejected, pxPerIn, wreathRadiusPx, cx, cy } = built;

  if (layersOn.base) drawGrapevine(ctx, cx, cy, wreathRadiusPx * 0.62, wreathRadiusPx * 0.96, bp.seed);

  const rad = lightAngle * D2R;
  const shx = -Math.cos(rad), shy = Math.sin(rad);

  instances.forEach((inst) => {
    if (!layersOn[inst.layer]) return;
    if (showShadows) {
      ctx.save();
      ctx.translate(inst.x + shx * inst.sizePx * 0.09, inst.y + shy * inst.sizePx * 0.09);
      ctx.rotate(inst.rotation);
      if (inst.mirror) ctx.scale(-1, 1);
      ctx.filter = "blur(" + Math.max(4, SZ * 0.006) + "px)";
      ctx.globalAlpha = 0.18;
      drawInstance(ctx, inst, "sil");
      ctx.restore();
      ctx.save();
      ctx.translate(inst.x + shx * inst.sizePx * 0.018, inst.y + shy * inst.sizePx * 0.018);
      ctx.rotate(inst.rotation);
      if (inst.mirror) ctx.scale(-1, 1);
      ctx.filter = "blur(" + Math.max(2, SZ * 0.0024) + "px)";
      ctx.globalAlpha = 0.13;
      drawInstance(ctx, inst, "sil");
      ctx.restore();
      ctx.filter = "none"; ctx.globalAlpha = 1;
    }
    ctx.save();
    ctx.translate(inst.x, inst.y);
    ctx.rotate(inst.rotation);
    if (inst.mirror) ctx.scale(-1, 1);
    drawInstance(ctx, inst, "asset");
    ctx.restore();
  });

  if (showOverlay) {
    ctx.save();
    ctx.strokeStyle = "rgba(74,103,65,0.30)";
    ctx.setLineDash([5, 7]); ctx.lineWidth = SZ * 0.0009 + 0.6;
    [0.4, 0.62, 0.8, 0.96].forEach((r) => {
      ctx.beginPath(); ctx.arc(cx, cy, wreathRadiusPx * r, 0, Math.PI * 2); ctx.stroke();
    });
    for (let a = 0; a < 360; a += 30) {
      const p1 = polarToXY(cx, cy, a, wreathRadiusPx * 0.3);
      const p2 = polarToXY(cx, cy, a, wreathRadiusPx * 1.02);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    }
    ctx.setLineDash([]);
    (bp.silence_arcs || []).forEach((s) => {
      ctx.fillStyle = "rgba(176,121,63,0.10)";
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, wreathRadiusPx * 1.02, -s.from_deg * D2R, -s.to_deg * D2R, true);
      ctx.closePath(); ctx.fill();
    });
    (bp.clusters || []).forEach((cl) => {
      const p = polarToXY(cx, cy, cl.angle_deg, cl.radius_norm * wreathRadiusPx);
      ctx.strokeStyle = "rgba(46,63,42,0.85)"; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "rgba(46,63,42,0.9)";
      ctx.font = "600 " + SZ * 0.0128 + "px Georgia, serif";
      ctx.fillText(cl.cluster_id + " · " + cl.angle_deg + "°", p.x + 14, p.y - 10);
    });
    ctx.restore();
  }
  return { count: instances.length, rejected, pxPerIn };
}

function AnchorPicker({ asset, onSet }) {
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current;
    if (!cv || !asset.prepared) return;
    const sc = Math.min(1, 240 / asset.prepared.width);
    cv.width = asset.prepared.width * sc;
    cv.height = asset.prepared.height * sc;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = "#EFEDE6";
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.drawImage(asset.prepared, 0, 0, cv.width, cv.height);
    const ax = asset.anchor.x * cv.width, ay = asset.anchor.y * cv.height;
    ctx.strokeStyle = "#B0793F"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(ax, ay, 8, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ax - 13, ay); ctx.lineTo(ax + 13, ay);
    ctx.moveTo(ax, ay - 13); ctx.lineTo(ax, ay + 13);
    ctx.stroke();
  }, [asset]);
  const click = (e) => {
    const rect = ref.current.getBoundingClientRect();
    onSet({
      x: Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width)),
      y: Math.min(1, Math.max(0, (e.clientY - rect.top) / rect.height)),
    });
  };
  return (
    <div>
      <canvas ref={ref} onClick={click} style={{ cursor: "crosshair", borderRadius: 4, display: "block", maxWidth: "100%" }} />
      <div style={S.hint}>Click the stem insertion point — it becomes the rotation origin.</div>
    </div>
  );
}

    return Array.from(s);

    return m;

  const resolve = useCallback((sku) => {
    const up = assets.find((a) => a.sku === sku && a.prepared);
    if (up) {
      return {
        kind: "image", prepared: up.prepared, silhouette: up.silhouette,
        anchor: up.anchor, real_width_in: up.real_width_in,
        layer_class: up.layer_class, rotation_mode: up.rotation_mode,
      };
    }
    const ph = PLACEHOLDERS[sku];
    if (ph) return Object.assign({ kind: "proc", silhouette: phSil[sku] }, ph);
    return null;
  }, [assets, phSil]);

  useEffect(() => {
    if (!canvasRef.current) return;
    const result = renderComposite(canvasRef.current, bp, {
      layersOn, showOverlay, showShadows, jitter, globalScale, lightAngle, resolve, sizePx: 1400,
    });
    setStats(result);

  const rebuildAsset = (rec) => {
    const img = new Image();

      const o = ORIENTS.find((x) => x.id === rec.orient);

      const silhouette = makeSilhouette(prepared);
      setAssets((prev) => prev.map((a) => (a.id === rec.id ? Object.assign({}, a, rec, { prepared, silhouette }) : a)));
    };
    img.src = rec.dataUrl;
  };

  const onFiles = (e) => {
    const files = Array.from(e.target.files || []);

    setBusy(true);
    let remaining = files.length;
    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = () => {
        const id = __uid++;
        const img = new Image();
        img.onload = () => {
          const prepared = prepareImage(img, 0, true);
          const silhouette = makeSilhouette(prepared);
          const unmapped = blueprintSkus.find((s) => !assets.some((a) => a.sku === s));
          setAssets((prev) => prev.concat([{

            real_width_in: 3.0, layer_class: "secondary", rotation_mode: "camera_facing",
            orient: "none", stripWhite: true,
            anchor: { x: 0.5, y: 0.5 },
            prepared, silhouette,

          remaining--; if (remaining <= 0) setBusy(false);

      reader.readAsDataURL(file);
