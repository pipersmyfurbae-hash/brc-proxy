/* ════════════════════════════════════════════════════════════════════
   EVERCRAFTED — WREATH RENDER STUDIO · BRC-4.1 (PRD 1.1 compliant)
   Clean rebuild. Operating rules of this version:
   1. PROMPTS ARE FROZEN PRESETS. The app never edits them. You select.
   2. EVERY EDITORIAL RENDER IS SEEDED. Same Proof + prompt + seed =
      same result, forever. Reproducible by design.
   3. EVERY RENDER IS LOGGED. The history panel keeps each result with
      its exact preset + seed, persisted in this browser. Nothing that
      works can be lost again.
   4. The Proof is deterministic and authoritative. AI never places.

   BRC-1.1 compliance (see PRD §2–§3):
   • COMPASS coordinate convention — 0°=12 o'clock, CW; 90°→3 o'clock.
     Math-convention transforms are banned (see polarToXY). Ships with a
     self-test asserting the cardinal positions.
   • Dual anchoring — visual_centroid is pinned to the blueprint polar
     position; insertion_point is the rotation pivot.
   • Deterministic within-layer draw order — radius desc, angle asc, idx.
   ════════════════════════════════════════════════════════════════════ */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ─────────── seeded RNG + polar math ─────────── */
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rrange = (rng, a, b) => a + rng() * (b - a);
const D2R = Math.PI / 180;
const normDeg = (d) => ((d % 360) + 360) % 360;
function inArc(angle, from, to) {
  const a = normDeg(angle), f = normDeg(from), t = normDeg(to);
  return f <= t ? a >= f && a <= t : a >= f || a <= t;
}
/* COMPASS CONVENTION (PIE canon, BRC-1.1 §2 — non-negotiable):
   blueprint angles are compass degrees — 0° = 12 o'clock, increasing
   CLOCKWISE. 90° = 3 o'clock, 180° = 6, 270° = 9. The transform is:
     x = cx + r·cos(θ − 90°)
     y = cy + r·sin(θ − 90°)
   Math-convention (CCW from 3 o'clock, −sin) is BANNED — it renders
   rotated 90° and mirrored. Any imported library/research code using
   math convention must be translated at this boundary. */
function polarToXY(cx, cy, angleDeg, radiusPx) {
  const t = (angleDeg - 90) * D2R;
  return { x: cx + radiusPx * Math.cos(t), y: cy + radiusPx * Math.sin(t) };
}
/* canvas-arc angle (radians from +x, CW because y is down) for a compass
   bearing — used by overlay wedges that call ctx.arc directly. */
const compassToArc = (deg) => (deg - 90) * D2R;

/* ═══════════ self-tests — BRC-1.1 v1 requirement ═══════════
   The artifact ships with the canonical checks. The headline assertion:
   a cluster at angle_deg 90 renders at the 3-o'clock position. Also
   guards PRNG determinism and the within-layer draw order. Runs once on
   load; the result is surfaced as a badge in the header. */
function withinLayerCmp(x, y) {
  return (y.radiusNorm || 0) - (x.radiusNorm || 0)
    || (x.angleDeg || 0) - (y.angleDeg || 0)
    || x.idx - y.idx;
}
function runSelfTests() {
  const results = [];
  const approx = (a, b, t = 0.5) => Math.abs(a - b) <= t;
  const check = (name, cond) => results.push({ name, pass: !!cond });
  [
    [0, 0, -100, "12 o'clock"],
    [90, 100, 0, "3 o'clock"],
    [180, 0, 100, "6 o'clock"],
    [270, -100, 0, "9 o'clock"],
  ].forEach(([deg, ex, ey, label]) => {
    const p = polarToXY(0, 0, deg, 100);
    check("compass " + deg + "° → " + label, approx(p.x, ex) && approx(p.y, ey));
  });
  const a = mulberry32(42), b = mulberry32(42);
  check("mulberry32 deterministic", a() === b() && a() === b());
  const sorted = [
    { radiusNorm: 0.8, angleDeg: 90, idx: 2 },
    { radiusNorm: 0.9, angleDeg: 10, idx: 1 },
    { radiusNorm: 0.8, angleDeg: 40, idx: 0 },
  ].sort(withinLayerCmp);
  check("within-layer order (radius↓, angle↑)",
    sorted[0].radiusNorm === 0.9 && sorted[1].angleDeg === 40 && sorted[2].angleDeg === 90);
  const pass = results.every((r) => r.pass);
  if (pass) console.log("BRC-1.1 self-tests passed (" + results.length + ")");
  else results.filter((r) => !r.pass).forEach((r) => console.error("BRC self-test FAIL:", r.name));
  return { pass, results };
}
const SELF_TEST = runSelfTests();

/* ─────────── IndexedDB persistence ─────────── */
function idbOpen() {
  return new Promise((res, rej) => {
    const r = indexedDB.open("ec-render-studio", 1);
    r.onupgradeneeded = () => { r.result.createObjectStore("kv"); };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite");
    tx.objectStore("kv").put(val, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("kv", "readonly");
    const q = tx.objectStore("kv").get(key);
    q.onsuccess = () => res(q.result);
    q.onerror = () => rej(q.error);
  });
}

/* ═══════════ procedural placeholders (fallbacks only) ═══════════ */
function drawHydrangea(ctx, rng, size) {
  const R = size / 2;
  for (let i = 0; i < 54; i++) {
    const rr = Math.sqrt(rng()) * R * 0.92, aa = rng() * Math.PI * 2;
    const fx = Math.cos(aa) * rr, fy = Math.sin(aa) * rr * 0.94;
    const fr = R * rrange(rng, 0.13, 0.19);
    const mix = rrange(rng, 0, 1) * 0.5 + (rr / R) * 0.5;
    const c = [205 - mix * 24, 218 - mix * 20, 236 - mix * 12];
    ctx.save(); ctx.translate(fx, fy); ctx.rotate(rng() * Math.PI);
    for (let p = 0; p < 4; p++) {
      ctx.rotate(Math.PI / 2);
      const g = ctx.createRadialGradient(0, -fr * 0.55, 0, 0, -fr * 0.55, fr * 0.8);
      g.addColorStop(0, "rgb(" + (c[0] + 18) + "," + (c[1] + 14) + "," + (c[2] + 10) + ")");
      g.addColorStop(1, "rgb(" + (c[0] - 14) + "," + (c[1] - 10) + "," + (c[2] - 4) + ")");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(0, -fr * 0.55, fr * 0.46, fr * 0.62, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = "rgba(122,144,178,0.9)";
    ctx.beginPath(); ctx.arc(0, 0, fr * 0.13, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}
function drawRanunculus(ctx, rng, size) {
  const R = size / 2;
  for (let L = 8; L >= 1; L--) {
    const lr = R * (L / 8), petals = 6 + L * 2, tone = 1 - L / 8;
    const base = [243 - tone * 6, 238 - tone * 4, 226 + tone * 14];
    const rot = rng() * Math.PI * 2;
    for (let p = 0; p < petals; p++) {
      const pa = rot + (p / petals) * Math.PI * 2;
      ctx.save();
      ctx.translate(Math.cos(pa) * lr * 0.55, Math.sin(pa) * lr * 0.55);
      ctx.rotate(pa + Math.PI / 2);
      const g = ctx.createLinearGradient(0, -lr * 0.5, 0, lr * 0.3);
      g.addColorStop(0, "rgb(" + base[0] + "," + base[1] + "," + base[2] + ")");
      g.addColorStop(1, "rgba(" + (base[0] - 26) + "," + (base[1] - 26) + "," + (base[2] - 28) + ",0.95)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.ellipse(0, 0, lr * 0.42, lr * 0.55, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "rgba(170,158,134,0.25)"; ctx.lineWidth = size * 0.006; ctx.stroke();
      ctx.restore();
    }
  }
  ctx.fillStyle = "#cfd3b4"; ctx.beginPath(); ctx.arc(0, 0, R * 0.07, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#9aa36f"; ctx.beginPath(); ctx.arc(0, 0, R * 0.035, 0, Math.PI * 2); ctx.fill();
}
function drawLisianthus(ctx, rng, size) {
  const R = size / 2, rot = rng() * Math.PI * 2;
  for (let p = 0; p < 6; p++) {
    ctx.save(); ctx.rotate(rot + (p / 6) * Math.PI * 2 + rrange(rng, -0.1, 0.1));
    const g = ctx.createLinearGradient(0, 0, R, 0);
    g.addColorStop(0, "#f8f5ee"); g.addColorStop(0.7, "#f2ecdf"); g.addColorStop(1, "#e6dcc9");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(R * 0.08, 0);
    ctx.bezierCurveTo(R * 0.35, -R * 0.5, R * 0.95, -R * 0.42, R * 0.98, -R * 0.04);
    ctx.bezierCurveTo(R * 1.0, R * 0.3, R * 0.5, R * 0.5, R * 0.08, R * 0.12);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(180,168,140,0.3)"; ctx.lineWidth = size * 0.007; ctx.stroke();
    ctx.restore();
  }
  for (let s = 0; s < 7; s++) {
    const sa = rng() * Math.PI * 2, sr = rng() * R * 0.12;
    ctx.fillStyle = s % 2 ? "#d6cf9a" : "#b8bd86";
    ctx.beginPath(); ctx.arc(Math.cos(sa) * sr, Math.sin(sa) * sr, R * 0.045, 0, Math.PI * 2); ctx.fill();
  }
}
function drawWaxflower(ctx, rng, size) {
  const R = size / 2;
  for (let b = 0; b < 6; b++) {
    const ba = rng() * Math.PI * 2, br = rng() * R * 0.8;
    const bx = Math.cos(ba) * br, by = Math.sin(ba) * br;
    ctx.strokeStyle = "rgba(110,122,92,0.8)"; ctx.lineWidth = size * 0.018;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(bx, by); ctx.stroke();
    const fr = R * rrange(rng, 0.18, 0.24);
    for (let p = 0; p < 5; p++) {
      const pa = (p / 5) * Math.PI * 2 + rng();
      ctx.fillStyle = "#faf8f2";
      ctx.beginPath();
      ctx.ellipse(bx + Math.cos(pa) * fr * 0.5, by + Math.sin(pa) * fr * 0.5, fr * 0.34, fr * 0.42, pa, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = "#c8b98f"; ctx.beginPath(); ctx.arc(bx, by, fr * 0.16, 0, Math.PI * 2); ctx.fill();
  }
}
function drawFoliageSprig(ctx, rng, size) {
  const len = size, bend = rrange(rng, -0.25, 0.25);
  ctx.strokeStyle = "#56603f"; ctx.lineWidth = size * 0.016;
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(len * 0.5, len * bend, len, len * bend * 1.6); ctx.stroke();
  for (let i = 1; i <= 9; i++) {
    const t = i / 10, sx = len * t;
    const sy = len * bend * (2 * t * (1 - t)) * 1.6 + len * bend * 1.6 * t * t;
    const side = i % 2 ? 1 : -1;
    const la = bend * 1.2 + side * rrange(rng, 0.7, 1.05);
    const ll = size * rrange(rng, 0.16, 0.24) * (1 - t * 0.35);
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(la);
    const g = ctx.createLinearGradient(0, 0, ll, 0);
    g.addColorStop(0, "#4A6741"); g.addColorStop(1, "#7a9468");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(ll * 0.5, 0, ll * 0.5, ll * 0.21, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(235,240,228,0.35)"; ctx.lineWidth = size * 0.006;
    ctx.beginPath(); ctx.moveTo(ll * 0.08, 0); ctx.lineTo(ll * 0.92, 0); ctx.stroke();
    ctx.restore();
  }
}
function drawEucalyptus(ctx, rng, size) {
  const len = size, bend = rrange(rng, -0.2, 0.2);
  ctx.strokeStyle = "#7d8a72"; ctx.lineWidth = size * 0.013;
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(len * 0.5, len * bend, len, len * bend * 1.5); ctx.stroke();
  for (let i = 1; i <= 8; i++) {
    const t = i / 9, sx = len * t;
    const sy = len * bend * (2 * t * (1 - t)) * 1.6 + len * bend * 1.5 * t * t;
    const side = i % 2 ? 1 : -1;
    const cr = size * rrange(rng, 0.07, 0.105) * (1 - t * 0.25);
    const cx2 = sx + side * cr * 1.1 * Math.abs(Math.sin(t * 4 + bend));
    const cy2 = sy + side * cr * 1.3;
    const g = ctx.createRadialGradient(cx2 - cr * 0.3, cy2 - cr * 0.3, 0, cx2, cy2, cr);
    g.addColorStop(0, "#b9c9b4"); g.addColorStop(1, "#94aa92");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx2, cy2, cr, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(120,138,118,0.5)"; ctx.lineWidth = size * 0.004; ctx.stroke();
  }
}

/* ═══════════ asset preparation (white strip + edge choke) ═══════════ */
function prepareImage(img, orientDeg, stripWhite) {
  const rot = orientDeg % 360;
  const swap = rot === 90 || rot === 270;
  const w = swap ? img.naturalHeight : img.naturalWidth;
  const h = swap ? img.naturalWidth : img.naturalHeight;
  const cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  const ctx = cv.getContext("2d");
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rot * D2R);
  ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
  ctx.restore();
  if (stripWhite) {
    const id = ctx.getImageData(0, 0, w, h);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const lum = Math.min(d[i], d[i + 1], d[i + 2]);
      if (lum > 248) d[i + 3] = 0;
      else if (lum > 232) d[i + 3] = Math.min(d[i + 3], Math.round(((248 - lum) / 16) * 255));
    }
    for (let pass = 0; pass < 2; pass++) {
      const kill = [];
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const i = (y * w + x) * 4 + 3;
          if (d[i] > 0 && d[i] < 230) {
            if (d[i - 4] === 0 || d[i + 4] === 0 || d[i - w * 4] === 0 || d[i + w * 4] === 0) kill.push(i);
          }
        }
      }
      for (const i of kill) d[i] = 0;
    }
    ctx.putImageData(id, 0, 0);
  }
  return cv;
}
function makeSilhouette(sourceCanvas) {
  const cv = document.createElement("canvas");
  cv.width = sourceCanvas.width; cv.height = sourceCanvas.height;
  const ctx = cv.getContext("2d");
  ctx.drawImage(sourceCanvas, 0, 0);
  ctx.globalCompositeOperation = "source-in";
  ctx.fillStyle = "rgb(48,42,32)";
  ctx.fillRect(0, 0, cv.width, cv.height);
  return cv;
}
function makeProceduralSilhouette(ph) {
  const cam = ph.rotation_mode === "camera_facing";
  const cv = document.createElement("canvas");
  cv.width = cam ? 360 : 420; cv.height = cam ? 360 : 260;
  const ctx = cv.getContext("2d");
  ctx.save();
  if (cam) ctx.translate(180, 180); else ctx.translate(30, 130);
  ph.draw(ctx, mulberry32(777), 320);
  ctx.restore();
  ctx.globalCompositeOperation = "source-in";
  ctx.fillStyle = "rgb(48,42,32)";
  ctx.fillRect(0, 0, cv.width, cv.height);
  return cv;
}

/* ═══════════ grapevine base — woody, reads as vine ═══════════ */
function drawGrapevine(ctx, cx, cy, rInner, rOuter, seed) {
  const rng = mulberry32(seed * 7919 + 13);
  const mid = (rInner + rOuter) / 2, band = (rOuter - rInner) / 2;
  const browns = ["#6b5138", "#54402c", "#7d6244", "#5e4a33", "#866a48", "#49382a"];
  for (let i = 0; i < 190; i++) {
    const r = mid + rrange(rng, -band, band) * rrange(rng, 0.4, 1);
    const start = rng() * 360, span = rrange(rng, 35, 150);
    const wob = rrange(rng, -band * 0.35, band * 0.35);
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rng() * 0.06 - 0.03);
    ctx.strokeStyle = browns[Math.floor(rng() * browns.length)];
    ctx.globalAlpha = rrange(rng, 0.35, 0.8);
    ctx.lineWidth = rrange(rng, 2.2, 5.5);
    ctx.beginPath();
    ctx.ellipse(0, 0, r + wob, r - wob, 0, -start * D2R, -(start + span) * D2R, true);
    ctx.stroke(); ctx.restore();
  }
  for (let k = 0; k < 26; k++) {
    const ka = rng() * 360, kr = mid + rrange(rng, -band, band) * 0.8;
    const p = polarToXY(cx, cy, ka, kr);
    ctx.fillStyle = browns[Math.floor(rng() * browns.length)];
    ctx.globalAlpha = rrange(rng, 0.35, 0.65);
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, rrange(rng, 2.5, 6), rrange(rng, 1.5, 3.5), rng() * Math.PI, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ═══════════ placement engine ═══════════ */
function buildInstances(bp, opts) {
  const { canvasPx, jitter, globalScale, resolve, nesting, canopy } = opts;
  const cx = canvasPx / 2, cy = canvasPx / 2;
  const fieldIn = bp.canvas.diameter_in + 5;
  const pxPerIn = canvasPx / fieldIn;
  const wreathRadiusPx = (bp.canvas.diameter_in / 2) * pxPerIn;
  const silence = bp.silence_arcs || [];
  const instances = [], rejected = [];
  let idx = 0;
  const inSilence = (a) => silence.some((s) => inArc(a, s.from_deg, s.to_deg));
  const canopyPct = typeof canopy === "number" ? canopy : 0;
  const density = Math.max(0.3, opts.foliageDensity || 1);
  const flarePct = typeof opts.outerFlare === "number" ? opts.outerFlare : 0;

  (bp.foliage_sweeps || []).forEach((sw) => {
    const res = resolve(sw.item_id);
    if (!res) { rejected.push({ reason: "unresolved_sku", id: sw.item_id }); return; }
    const step = sw.step_deg / density;
    for (let a = sw.arc_from; a <= sw.arc_to; a += step) {
      const rng = mulberry32(bp.seed * 9973 + idx * 271 + 7);
      const ang = normDeg(a + rrange(rng, -1, 1) * step * 0.35 * jitter);
      if (inSilence(ang)) { rejected.push({ reason: "silence_arc", id: sw.sweep_id }); idx++; continue; }
      const frng = mulberry32(bp.seed * 9973 + idx * 271 + 47);
      const flared = frng() < flarePct;
      let rad, rotation;
      if (flared) {
        rad = rrange(frng, 0.86, 0.97);
        /* radial-outward: compass tangent (ang·D2R) rotated −90° points out */
        rotation = ang * D2R - Math.PI / 2 + rrange(frng, -0.3, 0.3);
      } else {
        rad = sw.radius_norm + rrange(rng, -0.045, 0.045) * jitter;
        /* tangent to the ring under compass convention: the CW tangent
           screen direction at bearing θ is (cos θ, sin θ) → rotate by θ. */
        const tangent = ang * D2R + (sw.flow === "cw" ? 0 : Math.PI);
        rotation = tangent + rrange(rng, -0.3, 0.3) * jitter;
      }
      const pos = polarToXY(cx, cy, ang, rad * wreathRadiusPx);
      instances.push({
        idx, item_id: sw.item_id, res, x: pos.x, y: pos.y, rotation,
        angleDeg: ang, radiusNorm: rad,
        sizePx: res.real_width_in * pxPerIn * globalScale * rrange(rng, 0.85, 1.12) * (flared ? 0.85 : 1),
        mirror: rng() > 0.5, layer: res.layer_class,
        seedLocal: bp.seed * 9973 + idx * 271,
        canopy: !flared && mulberry32(bp.seed * 9973 + idx * 271 + 31)() < canopyPct,
      });
      idx++;
    }
  });

  const collarSku = (bp.foliage_sweeps || []).map((s) => s.item_id).find((s) => resolve(s));
  const collarRes = collarSku ? resolve(collarSku) : null;

  (bp.clusters || []).forEach((cl, ci) => {
    if (nesting && collarRes && cl.type !== "filler") {
      const collarCount = density < 0.65 ? 1 : 2;
      for (let k = 0; k < collarCount; k++) {
        const crng = mulberry32(bp.seed * 6131 + ci * 97 + k * 17 + 5);
        const cang = normDeg(cl.angle_deg + (k === 0 ? -1 : 1) * rrange(crng, 7, 15));
        if (!inSilence(cang)) {
          const crad = cl.radius_norm - 0.015 + rrange(crng, -0.02, 0.02);
          const cpos = polarToXY(cx, cy, cang, crad * wreathRadiusPx);
          /* tangent under compass convention; k flips which way it sweeps */
          const ctan = cang * D2R + (k === 0 ? Math.PI : 0);
          instances.push({
            idx, item_id: collarSku, res: collarRes, x: cpos.x, y: cpos.y,
            angleDeg: cang, radiusNorm: crad,
            rotation: ctan + rrange(crng, -0.35, 0.35),
            sizePx: collarRes.real_width_in * pxPerIn * globalScale * rrange(crng, 0.7, 0.9),
            mirror: crng() > 0.5, layer: "foliage",
            seedLocal: bp.seed * 6131 + ci * 97 + k * 17,
            canopy: false,
          });
          idx++;
        }
      }
    }
    cl.stems.forEach((stem) => {
      const res = resolve(stem.item_id);
      if (!res) { rejected.push({ reason: "unresolved_sku", id: stem.item_id }); return; }
      for (let q = 0; q < stem.qty; q++) {
        const rng = mulberry32(bp.seed * 9973 + idx * 271 + 7);
        const spread = stem.qty > 1 ? (q - (stem.qty - 1) / 2) * rrange(rng, 8, 13) : 0;
        const ang = normDeg(cl.angle_deg + spread + rrange(rng, -3, 3) * jitter);
        if (inSilence(ang)) { rejected.push({ reason: "silence_arc", id: cl.cluster_id }); idx++; continue; }
        const pullIn = nesting && res.rotation_mode === "camera_facing" ? 0.965 : 1;
        const rad = (cl.radius_norm + rrange(rng, -0.05, 0.05) * jitter) * pullIn;
        const pos = polarToXY(cx, cy, ang, rad * wreathRadiusPx);
        instances.push({
          idx, item_id: stem.item_id, res, x: pos.x, y: pos.y,
          angleDeg: ang, radiusNorm: rad,
          /* camera-facing: small upright tilt. tangent/radial stems lie
             along the compass tangent (ang·D2R) at their bearing. */
          rotation: res.rotation_mode === "camera_facing" ? rrange(rng, -0.26, 0.26) : ang * D2R,
          sizePx: res.real_width_in * pxPerIn * globalScale * rrange(rng, 0.92, 1.08),
          mirror: rng() > 0.5 && res.rotation_mode === "camera_facing",
          layer: res.layer_class,
          seedLocal: bp.seed * 9973 + idx * 271,
          canopy: false,
        });
        idx++;
      }
    });
  });

  /* Deterministic draw order (BRC-1.1 §3). Across layers: z-stack order.
     Within a layer: radius DESC (outer draws first, inner overlaps),
     then angle ASC, then instance index — ties broken identically every
     run, so same seed + same inputs = pixel-identical output. Never rely
     on object-iteration order. */
  instances.sort((a, b) =>
    LAYER_ORDER.indexOf(a.layer) - LAYER_ORDER.indexOf(b.layer)
    || withinLayerCmp(a, b));
  return { instances, rejected, pxPerIn, wreathRadiusPx, cx, cy };
}

function drawInstance(ctx, inst, mode) {
  const { res } = inst;
  if (res.kind === "image") {
    const src = mode === "sil" ? res.silhouette : res.prepared;
    if (!src) return;
    const W = inst.sizePx;
    const H = W * (res.prepared.height / res.prepared.width);
    /* BRC-1.1: the blueprint's polar coordinate addresses the VISUAL
       CENTROID of the bloom head — pin that to (inst.x, inst.y), not the
       stem insertion point, or balance/asymmetry desyncs from the image.
       (insertion_point is the conceptual rotation pivot; with an absolute
       rotation + centroid pin the rigid transform is identical either way.) */
    const c = res.visual_centroid || { x: 0.5, y: 0.5 };
    ctx.drawImage(src, -c.x * W, -c.y * H, W, H);
  } else {
    if (mode === "sil") {
      const sil = res.silhouette;
      const cam = res.rotation_mode === "camera_facing";
      const sf = inst.sizePx / 320;
      if (cam) ctx.drawImage(sil, -180 * sf, -180 * sf, 360 * sf, 360 * sf);
      else ctx.drawImage(sil, -30 * sf, -130 * sf, 420 * sf, 260 * sf);
    } else {
      res.draw(ctx, mulberry32(inst.seedLocal + 3), inst.sizePx);
    }
  }
}

function renderComposite(canvas, bp, opts) {
  const { layersOn, showOverlay, showShadows, jitter, globalScale, lightAngle, resolve, sizePx, nesting, canopy, foliageDensity, outerFlare } = opts;
  const SZ = sizePx || 1400;
  canvas.width = SZ; canvas.height = SZ;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#FCFBF8";
  ctx.fillRect(0, 0, SZ, SZ);

  const built = buildInstances(bp, { canvasPx: SZ, jitter, globalScale, resolve, nesting, canopy, foliageDensity, outerFlare });
  const { instances, rejected, pxPerIn, wreathRadiusPx, cx, cy } = built;

  if (layersOn.base) drawGrapevine(ctx, cx, cy, wreathRadiusPx * 0.62, wreathRadiusPx * 0.96, bp.seed);

  const rad = lightAngle * D2R;
  const shx = -Math.cos(rad), shy = Math.sin(rad);

  instances.forEach((inst) => {
    if (!layersOn[inst.layer]) return;
    if (showShadows) {
      ctx.save();
      ctx.translate(inst.x + shx * inst.sizePx * 0.09, inst.y + shy * inst.sizePx * 0.09);
      ctx.rotate(inst.rotation);
      if (inst.mirror) ctx.scale(-1, 1);
      ctx.filter = "blur(" + Math.max(4, SZ * 0.006) + "px)";
      ctx.globalAlpha = 0.18;
      drawInstance(ctx, inst, "sil");
      ctx.restore();
      ctx.save();
      ctx.translate(inst.x + shx * inst.sizePx * 0.018, inst.y + shy * inst.sizePx * 0.018);
      ctx.rotate(inst.rotation);
      if (inst.mirror) ctx.scale(-1, 1);
      ctx.filter = "blur(" + Math.max(2, SZ * 0.0024) + "px)";
      ctx.globalAlpha = 0.13;
      drawInstance(ctx, inst, "sil");
      ctx.restore();
      ctx.filter = "none"; ctx.globalAlpha = 1;
    }
    ctx.save();
    ctx.translate(inst.x, inst.y);
    ctx.rotate(inst.rotation);
    if (inst.mirror) ctx.scale(-1, 1);
    drawInstance(ctx, inst, "asset");
    ctx.restore();
  });

  /* canopy pass — seeded foliage subset over bloom edges */
  instances.forEach((inst) => {
    if (!inst.canopy || !layersOn[inst.layer]) return;
    ctx.save();
    ctx.translate(inst.x, inst.y);
    ctx.rotate(inst.rotation);
    if (inst.mirror) ctx.scale(-1, 1);
    drawInstance(ctx, inst, "asset");
    ctx.restore();
  });

  if (showOverlay) {
    ctx.save();
    ctx.strokeStyle = "rgba(74,103,65,0.30)";
    ctx.setLineDash([5, 7]); ctx.lineWidth = SZ * 0.0009 + 0.6;
    [0.4, 0.62, 0.8, 0.96].forEach((r) => {
      ctx.beginPath(); ctx.arc(cx, cy, wreathRadiusPx * r, 0, Math.PI * 2); ctx.stroke();
    });
    for (let a = 0; a < 360; a += 30) {
      const p1 = polarToXY(cx, cy, a, wreathRadiusPx * 0.3);
      const p2 = polarToXY(cx, cy, a, wreathRadiusPx * 1.02);
      ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    }
    ctx.setLineDash([]);
    (bp.silence_arcs || []).forEach((s) => {
      ctx.fillStyle = "rgba(176,121,63,0.10)";
      ctx.beginPath(); ctx.moveTo(cx, cy);
      /* compass bearings → canvas-arc angles; CW (anticlockwise=false)
         from_deg → to_deg matches compass increasing clockwise. */
      const a0 = compassToArc(s.from_deg);
      const a1 = compassToArc(s.to_deg < s.from_deg ? s.to_deg + 360 : s.to_deg);
      ctx.arc(cx, cy, wreathRadiusPx * 1.02, a0, a1, false);
      ctx.closePath(); ctx.fill();
    });
    (bp.clusters || []).forEach((cl) => {
      const p = polarToXY(cx, cy, cl.angle_deg, cl.radius_norm * wreathRadiusPx);
      ctx.strokeStyle = "rgba(46,63,42,0.85)"; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "rgba(46,63,42,0.9)";
      ctx.font = "600 " + SZ * 0.0128 + "px Georgia, serif";
      ctx.fillText(cl.cluster_id + " · " + cl.angle_deg + "°", p.x + 14, p.y - 10);
    });
    ctx.restore();
  }

  const itemCounts = {};
  instances.forEach((inst) => {
    const nm = (inst.res && (inst.res.name || (PLACEHOLDERS[inst.item_id] && PLACEHOLDERS[inst.item_id].name))) || inst.item_id;
    itemCounts[nm] = (itemCounts[nm] || 0) + 1;
  });
  return { count: instances.length, rejected, pxPerIn, itemCounts };
}

/* ═══════════ anchor picker — dual point (BRC-1.1 §4) ═══════════
   visual_centroid (green) is pinned to the blueprint polar position.
   insertion_point (amber) is the stem→base point / rotation pivot. */
function crosshair(ctx, x, y, color) {
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 13, y); ctx.lineTo(x + 13, y);
  ctx.moveTo(x, y - 13); ctx.lineTo(x, y + 13);
  ctx.stroke();
}
function AnchorPicker({ asset, onSet }) {
  const ref = useRef(null);
  const [editing, setEditing] = useState("visual_centroid");
  const centroid = asset.visual_centroid || { x: 0.5, y: 0.5 };
  const insertion = asset.insertion_point || { x: 0.5, y: 0.92 };
  useEffect(() => {
    const cv = ref.current;
    if (!cv || !asset.prepared) return;
    const sc = Math.min(1, 240 / asset.prepared.width);
    cv.width = asset.prepared.width * sc;
    cv.height = asset.prepared.height * sc;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = "#EFEDE6";
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.drawImage(asset.prepared, 0, 0, cv.width, cv.height);
    crosshair(ctx, insertion.x * cv.width, insertion.y * cv.height, "#B0793F");
    crosshair(ctx, centroid.x * cv.width, centroid.y * cv.height, "#4A6741");
  }, [asset, editing]);
  const click = (e) => {
    const rect = ref.current.getBoundingClientRect();
    const pt = {
      x: Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width)),
      y: Math.min(1, Math.max(0, (e.clientY - rect.top) / rect.height)),
    };
    onSet({ [editing]: pt });
  };
  return (
    <div>
      <div style={Object.assign({}, S.row, { marginBottom: 8 })}>
        <button onClick={() => setEditing("visual_centroid")}
          style={editing === "visual_centroid" ? S.btnPrimary : S.btnGhost}>● Visual centroid</button>
        <button onClick={() => setEditing("insertion_point")}
          style={editing === "insertion_point" ? S.btnPrimary : S.btnGhost}>● Insertion point</button>
      </div>
      <canvas ref={ref} onClick={click} style={{ cursor: "crosshair", borderRadius: 4, display: "block", maxWidth: "100%" }} />
      <div style={S.hint}>
        Green = visual centroid (pinned to the blueprint position — set it on the bloom head's center).
        Amber = insertion point (where the stem meets the base — the rotation pivot).
      </div>
    </div>
  );
}

  }, [assets, phSil]);

  const renderOpts = { layersOn, showShadows, jitter, globalScale, lightAngle, resolve, nesting, canopy: canopyPct, foliageDensity, outerFlare };

  useEffect(() => {
    if (!canvasRef.current) return;

    setStats(result);
  }, [bp, layersOn, showOverlay, showShadows, jitter, globalScale, lightAngle, resolve, nesting, canopyPct, foliageDensity, outerFlare]);

  /* ─── asset ingest + persistence ─── */
  const loadAssetRecord = (rec) => {

      setAssets((prev) => prev.concat([{

  const restoredRef = useRef(false);
  useEffect(() => {

    idbGet("presetKey").then((k) => { if (k && PROMPT_PRESETS[k]) setPresetKey(k); }).catch(() => {});

  useEffect(() => {
    if (!restoredRef.current) return;

        sku: a.sku, name: a.name, real_width_in: a.real_width_in,

    }, 800);
    return () => clearTimeout(t);

  useEffect(() => { if (restoredRef.current) idbSet("history", history).catch(() => {}); }, [history]);
  useEffect(() => { if (restoredRef.current) idbSet("customPrompt", customPrompt).catch(() => {}); }, [customPrompt]);
  useEffect(() => { if (restoredRef.current) idbSet("presetKey", presetKey).catch(() => {}); }, [presetKey]);

  const onFiles = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setBusy(true);
    let remaining = files.length;
    files.forEach((file) => {
      const reader = new FileReader();
      reader.onload = () => {
        const id = __uid++;
        const img = new Image();
        img.onload = () => {
          const prepared = prepareImage(img, 0, true);
          const silhouette = makeSilhouette(prepared);
          const unmapped = blueprintSkus.find((s) => !assets.some((a) => a.sku === s));
          const slot = unmapped && PLACEHOLDERS[unmapped];
          setAssets((prev) => prev.concat([{
            id, sku: unmapped || ("EC-NEW-" + id),
            name: file.name.replace(/\.[^.]+$/, ""),
            dataUrl: reader.result,
            real_width_in: slot ? slot.real_width_in : 3.0,
            layer_class: slot ? slot.layer_class : "secondary",
            rotation_mode: slot ? slot.rotation_mode : "camera_facing",
            orient: "none", stripWhite: true,
            insertion_point: { x: 0.5, y: 0.92 }, visual_centroid: { x: 0.5, y: 0.5 },
            prepared, silhouette,
          }]));
          remaining--; if (remaining <= 0) setBusy(false);
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  };

  const rebuildAsset = (rec) => {
    const img = new Image();
    img.onload = () => {
      const o = ORIENTS.find((x) => x.id === rec.orient);
      const prepared = prepareImage(img, o ? o.deg : 0, rec.stripWhite);
      const silhouette = makeSilhouette(prepared);
      setAssets((prev) => prev.map((a) => (a.id === rec.id ? Object.assign({}, a, rec, { prepared, silhouette }) : a)));
    };
    img.src = rec.dataUrl;
  };
  const updateAsset = (id, patch, reprepare) => {
    setAssets((prev) => {
      const next = prev.map((a) => (a.id === id ? Object.assign({}, a, patch) : a));
      if (reprepare) {
        const rec = next.find((a) => a.id === id);
        if (rec) setTimeout(() => rebuildAsset(rec), 0);
      }
      return next;
    });
  };
  const removeAsset = (id) => setAssets((prev) => prev.filter((a) => a.id !== id));

  const exportManifest = () => {
    const out = {
      version: "BRC-4.1", exported: new Date().toISOString(),
      assets: assets.map((a) => ({
        sku: a.sku, name: a.name, real_width_in: a.real_width_in,
        layer_class: a.layer_class, rotation_mode: a.rotation_mode,
        orient: a.orient, strip_white: a.stripWhite,
        insertion_point: a.insertion_point, visual_centroid: a.visual_centroid,
        image_dataurl: a.dataUrl,
      })),
    };
    const blob = new Blob([JSON.stringify(out)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "evercrafted-asset-manifest.json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importManifest = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        (data.assets || []).forEach(loadAssetRecord);
      } catch (err) { alert("Manifest could not be read: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const copyPrompt = (sku) => {
    const text = stemPrompt(sku);
    const done = () => { setCopiedSku(sku); setTimeout(() => setCopiedSku(null), 1800); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => window.prompt("Copy the prompt:", text));
    } else window.prompt("Copy the prompt:", text);
  };

  const applyJson = useCallback(() => {
    try {
      const parsed = JSON.parse(jsonText);
      if (!parsed.canvas || !parsed.canvas.diameter_in) throw new Error("canvas.diameter_in is required");
      setBlueprint(parsed);
      if (typeof parsed.seed === "number") setSeed(parsed.seed);
      setJsonError(null);
    } catch (e2) { setJsonError(e2.message); }
  }, [jsonText]);

  const exportPNG = useCallback(() => {
    const off = document.createElement("canvas");
    renderComposite(off, bp, Object.assign({}, renderOpts, { showOverlay: false, sizePx: 3000 }));
    const a = document.createElement("a");
    a.href = off.toDataURL("image/png");
    a.download = (bp.blueprint_id || "EC_WR") + "_seed" + seed + "_proof_3000.png";
    a.click();
  }, [bp, layersOn, showShadows, jitter, globalScale, lightAngle, resolve, seed, nesting, canopyPct, foliageDensity, outerFlare]);

  /* ─── EDITORIAL — frozen preset + seed, fully logged ─── */
  const activePromptText = presetKey === "custom" ? customPrompt : PROMPT_PRESETS[presetKey].text;

  const runEditorial = useCallback(async () => {
    if (presetKey === "custom" && !customPrompt.trim()) { setEdError("Custom prompt is empty."); return; }
    setEdBusy(true); setEdError(null);
    try {
      const off = document.createElement("canvas");
      const renderResult = renderComposite(off, bp, Object.assign({}, renderOpts, { showOverlay: false, sizePx: 1408 }));
      const proofDataUrl = off.toDataURL("image/jpeg", 0.92);
      /* small thumb for the permanent history */
      const th = document.createElement("canvas");
      th.width = 280; th.height = 280;
      th.getContext("2d").drawImage(off, 0, 0, 280, 280);
      const proofThumb = th.toDataURL("image/jpeg", 0.8);

      const counts = renderResult.itemCounts || {};
      const lock = useLock && Object.keys(counts).length
        ? "INVENTORY LOCK — this wreath contains exactly: " +
          Object.entries(counts).map(([n, c]) => c + "× " + n).join(", ") + INVENTORY_LOCK_TAIL
        : "";

      const r = await fetch("/api/realism", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image: proofDataUrl, prompt: lock + activePromptText, seed: edSeed }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error((data && data.error) || ("Proxy returned " + r.status));
      if (!data.output) throw new Error("Proxy returned no output image");

      const entry = {
        url: data.output, proofThumb,
        seed: edSeed, preset: presetKey,
        presetLabel: PROMPT_PRESETS[presetKey].label,
        ts: new Date().toISOString(),
        proofSeed: seed, density: foliageDensity,
      };
      setCurrent(entry);
      setHistory((prev) => [entry].concat(prev).slice(0, 18));
    } catch (err) {
      setEdError(err.message || "Editorial pass failed");
    } finally {
      setEdBusy(false);
    }
  }, [bp, layersOn, showShadows, jitter, globalScale, lightAngle, resolve, nesting, canopyPct, foliageDensity, outerFlare, presetKey, customPrompt, useLock, edSeed, seed, activePromptText]);

  const reuse = (h) => {
    setPresetKey(PROMPT_PRESETS[h.preset] ? h.preset : "faithful");
    setEdSeed(h.seed);
    if (typeof h.proofSeed === "number") setSeed(h.proofSeed);
    if (typeof h.density === "number") setFoliageDensity(h.density);
    setCurrent(h);
  };

  const mappedCount = blueprintSkus.filter((s) => assets.some((a) => a.sku === s && a.prepared)).length;
  const silenceRejects = stats.rejected.filter((r) => r.reason === "silence_arc").length;
  const fmtTime = (ts) => new Date(ts).toLocaleString([], { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });

  return (
    <div style={S.app}>
      <header style={S.header}>
        <div>
          <div style={S.brand}>Evercrafted</div>
          <h1 style={S.title}>Wreath Render Studio</h1>
        </div>
        <div style={S.headerMeta}>
          <span style={S.badge}>BRC-4.1</span>
          <span style={S.badgeOutline}>Seeded · Logged · Reproducible</span>
          <span
            title={SELF_TEST.results.map((r) => (r.pass ? "✓ " : "✗ ") + r.name).join("\n")}
            style={Object.assign({}, S.badgeOutline, SELF_TEST.pass
              ? { borderColor: "#4A6741", color: "#4A6741" }
              : { borderColor: "#a8502e", color: "#a8502e" })}>
            {SELF_TEST.pass ? "compass ✓" : "self-test ✗"}
          </span>
        </div>
      </header>

      <div style={S.main}>
        <div style={S.canvasWrap}>
          <canvas ref={canvasRef} style={S.canvas} />
          <div style={S.canvasFooter}>
            <span>{bp.blueprint_id} · {bp.formula} · {bp.canvas ? bp.canvas.diameter_in : ""}″</span>
            <span>seed {seed} · {mappedCount}/{blueprintSkus.length} real SKUs · {stats.count} placed · {silenceRejects} silence-enforced</span>
          </div>
        </div>

        <aside style={S.panel}>
          <div style={S.section}>
            <div style={S.sectionLabel}>Composition Seed</div>
            <div style={S.row}>
              <input type="number" value={seed}
                onChange={(e) => setSeed(parseInt(e.target.value || "0", 10))} style={S.input} />
              <button onClick={() => setSeed(Math.floor(Math.random() * 99999))} style={S.btnGhost}>Reroll</button>
            </div>
            <div style={S.hint}>Same seed + same settings = identical Proof. Always.</div>
          </div>

          <div style={S.section}>
            <div style={S.sectionLabel}>Foliage Density — {Math.round(foliageDensity * 100)}%</div>
            <input type="range" min="0.3" max="1.6" step="0.05" value={foliageDensity}
              onChange={(e) => setFoliageDensity(parseFloat(e.target.value))} style={S.slider} />
            <div style={S.sectionLabel}>Outer Flare — {Math.round(outerFlare * 100)}%</div>
            <input type="range" min="0" max="0.6" step="0.05" value={outerFlare}
              onChange={(e) => setOuterFlare(parseFloat(e.target.value))} style={S.slider} />
            <div style={S.sectionLabel}>Canopy Overlap — {Math.round(canopyPct * 100)}%</div>
            <input type="range" min="0" max="0.5" step="0.05" value={canopyPct}
              onChange={(e) => setCanopyPct(parseFloat(e.target.value))} style={S.slider} />
            <div style={S.sectionLabel}>Organic Variance — {Math.round(jitter * 100)}%</div>
            <input type="range" min="0" max="1" step="0.05" value={jitter}
              onChange={(e) => setJitter(parseFloat(e.target.value))} style={S.slider} />
            <div style={S.sectionLabel}>Scale — {globalScale.toFixed(2)}× · Light — {lightAngle}°</div>
            <input type="range" min="0.8" max="1.25" step="0.01" value={globalScale}
              onChange={(e) => setGlobalScale(parseFloat(e.target.value))} style={S.slider} />
            <input type="range" min="0" max="360" step="5" value={lightAngle}
              onChange={(e) => setLightAngle(parseInt(e.target.value, 10))} style={S.slider} />
            <label style={S.check}>
              <input type="checkbox" checked={nesting} onChange={() => setNesting((v) => !v)} />
              <span>Foliage collars under blooms</span>
            </label>
            <label style={S.check}>
              <input type="checkbox" checked={showShadows} onChange={() => setShowShadows((v) => !v)} />
              <span>Silhouette shadows</span>
            </label>
            <label style={S.check}>
              <input type="checkbox" checked={showOverlay} onChange={() => setShowOverlay((v) => !v)} />
              <span>Blueprint overlay</span>
            </label>
          </div>

          <button onClick={exportPNG} style={S.btnPrimary}>Export Proof PNG · 3000px</button>
          <button onClick={() => setShowJson((v) => !v)} style={S.btnGhostWide}>
            {showJson ? "Hide" : "Edit"} Blueprint JSON
          </button>
        </aside>
      </div>

      {showJson && (
        <div style={S.cardWrap}>
          <div style={S.sectionLabel}>Blueprint JSON — EC_WR_V2</div>
          <textarea value={jsonText} onChange={(e) => setJsonText(e.target.value)} spellCheck={false} style={S.textarea} />
          <div style={S.row}>
            <button onClick={applyJson} style={S.btnPrimary}>Apply Blueprint</button>
            {jsonError && <span style={S.error}>⚠ {jsonError}</span>}
          </div>
        </div>
      )}

      {/* ═══════ EDITORIAL ═══════ */}
      <div style={S.editorialWrap}>
        <div style={S.sectionLabel}>Editorial Render — frozen presets · seeded · logged</div>
        <div style={S.hint}>
          The prompt is a preset you select — this app never modifies it. Same Proof + same preset + same render seed returns the same image.
          Every render lands in the history below with its exact settings, permanently.
        </div>
        <div style={S.edGrid}>
          <div>
            <label style={S.fieldLabel}>Prompt preset
              <select value={presetKey} onChange={(e) => setPresetKey(e.target.value)} style={S.select}>
                {Object.entries(PROMPT_PRESETS).map(([k, p]) => <option key={k} value={k}>{p.label}</option>)}
              </select>
            </label>
            {presetKey === "custom" ? (
              <textarea value={customPrompt} onChange={(e) => setCustomPrompt(e.target.value)}
                placeholder="Write your own instruction. It saves automatically and is never altered."
                style={Object.assign({}, S.textarea, { height: 130, marginTop: 8, marginBottom: 0 })} spellCheck={false} />
            ) : (
              <div style={S.frozen}>{PROMPT_PRESETS[presetKey].text}</div>
            )}
            <div style={Object.assign({}, S.row, { marginTop: 12 })}>
              <label style={Object.assign({}, S.fieldLabel, { flex: "0 0 150px" })}>Render seed
                <input type="number" value={edSeed}
                  onChange={(e) => setEdSeed(parseInt(e.target.value || "0", 10))} style={S.input} />
              </label>
              <button onClick={() => setEdSeed(Math.floor(Math.random() * 999999))} style={S.btnGhost}>New seed</button>
              <label style={Object.assign({}, S.check, { marginTop: 14 })}>
                <input type="checkbox" checked={useLock} onChange={() => setUseLock((v) => !v)} />
                <span>Inventory lock</span>
              </label>
            </div>
            <div style={Object.assign({}, S.row, { marginTop: 12 })}>
              <button onClick={runEditorial} disabled={edBusy} style={S.btnPrimary}>
                {edBusy ? "Rendering…" : "Generate Editorial"}
              </button>
              {edError && <span style={S.error}>⚠ {edError}</span>}
            </div>
            <div style={S.hint}>Variation = change the render seed and generate again. Each pull costs a few cents. Keep the winners; they're logged either way.</div>
          </div>

          {current && (
            <div style={S.compareWrap}>
              <div style={S.compareCol}>
                <div style={S.compareLabel}>Proof</div>
                <img src={current.proofThumb} alt="Proof" style={S.compareImg} />
              </div>
              <div style={S.compareCol}>
                <div style={S.compareLabel}>Editorial · seed {current.seed} · {current.presetLabel}</div>
                <img src={current.url} alt="Editorial" style={S.compareImg} />
                <a href={current.url} target="_blank" rel="noreferrer" style={Object.assign({}, S.btnPrimary, { textDecoration: "none", display: "inline-block", textAlign: "center" })}>
                  Open Full Size
                </a>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ═══════ RENDER HISTORY ═══════ */}
      {history.length > 0 && (
        <div style={S.cardWrap}>
          <div style={S.sectionLabel}>Render History — nothing gets lost</div>
          <div style={S.hint}>Every render with its exact preset, render seed, Proof seed, and density. "Reuse" restores all of them so any result can be regenerated.</div>
          <div style={S.histGrid}>
            {history.map((h, i) => (
              <div key={h.ts + i} style={S.histCard}>
                <img src={h.url} alt="render" style={S.histImg} />
                <div style={S.histMeta}>
                  <div>{fmtTime(h.ts)} · seed {h.seed}</div>
                  <div style={{ color: "rgba(38,36,31,0.5)" }}>{(h.presetLabel || h.preset || "").split(" — ")[0]} · proof {h.proofSeed} · density {Math.round((h.density || 1) * 100)}%</div>
                </div>
                <div style={Object.assign({}, S.row, { padding: "0 10px 10px" })}>
                  <a href={h.url} target="_blank" rel="noreferrer" style={S.histLink}>Open</a>
                  <button onClick={() => reuse(h)} style={S.btnGhost}>Reuse</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ═══════ ASSET LIBRARY ═══════ */}
      <div style={S.cardWrap}>
        <div style={S.libraryHeader}>
          <div>
            <div style={S.sectionLabel}>Asset Library — your real stems</div>
            <div style={S.hint}>
              Saves itself in this browser and survives reloads. White backgrounds strip automatically with edge cleanup.
              Picking a SKU applies that slot's width, layer, and rotation — no guessing.
            </div>
          </div>
          <div style={S.row}>
            <button onClick={() => fileRef.current && fileRef.current.click()} style={S.btnPrimary}>
              {busy ? "Loading…" : "Upload Cutouts"}
            </button>
            <button onClick={() => setShowKit((v) => !v)} style={S.btnGhost}>{showKit ? "Hide" : "Stem"} Prompt Kit</button>
            <button onClick={exportManifest} style={S.btnGhost} disabled={!assets.length}>Export Manifest</button>
            <button onClick={() => manifestRef.current && manifestRef.current.click()} style={S.btnGhost}>Import</button>
          </div>
          <input ref={fileRef} type="file" accept="image/png,image/webp,image/jpeg" multiple style={{ display: "none" }} onChange={onFiles} />
          <input ref={manifestRef} type="file" accept="application/json" style={{ display: "none" }} onChange={importManifest} />
        </div>

        {showKit && (
          <div style={S.kitWrap}>
            <div style={S.hint}>
              Paste each prompt into Midjourney, upscale the cleanest result, upload it here. Foliage prompts come out base-left / tips-right so they import tangent-ready.
            </div>
            {blueprintSkus.map((sku) => (
              <div key={sku} style={S.kitRow}>
                <div style={S.kitHead}>
                  <span style={S.kitName}>{sku}{PLACEHOLDERS[sku] ? " — " + PLACEHOLDERS[sku].name : ""}</span>
                  <button onClick={() => copyPrompt(sku)} style={S.btnGhost}>
                    {copiedSku === sku ? "Copied ✓" : "Copy Prompt"}
                  </button>
                </div>
                <div style={S.kitPrompt}>{stemPrompt(sku)}</div>
              </div>
            ))}
          </div>
        )}

        {!assets.length && (
          <div style={S.empty}>
            No real assets yet — rendering on placeholders. Upload cutouts and map them to slots ({blueprintSkus.join(" · ")}).
          </div>
        )}

        <div style={S.assetGrid}>
          {assets.map((a) => (
            <div key={a.id} style={S.assetCard}>
              <div style={S.assetThumbWrap}>
                {a.prepared && <img src={a.prepared.toDataURL()} alt={a.name} style={S.assetThumb} />}
              </div>
              <div style={S.assetFields}>
                <label style={S.fieldLabel}>SKU mapping
                  <select value={blueprintSkus.includes(a.sku) ? a.sku : "__custom"}
                    onChange={(e) => {
                      const v = e.target.value;
                      if (v === "__custom") return;
                      const slot = PLACEHOLDERS[v];
                      if (slot) updateAsset(a.id, { sku: v, real_width_in: slot.real_width_in, layer_class: slot.layer_class, rotation_mode: slot.rotation_mode });
                      else updateAsset(a.id, { sku: v });
                    }}
                    style={S.select}>
                    {blueprintSkus.map((s) => <option key={s} value={s}>{s}{PLACEHOLDERS[s] ? " — " + PLACEHOLDERS[s].name : ""}</option>)}
                    <option value="__custom">custom…</option>
                  </select>
                </label>
                {!blueprintSkus.includes(a.sku) && (
                  <label style={S.fieldLabel}>Custom SKU
                    <input value={a.sku} onChange={(e) => updateAsset(a.id, { sku: e.target.value })} style={S.input} />
                  </label>
                )}
                <label style={S.fieldLabel}>True width (inches)
                  <input type="number" step="0.1" min="0.5" value={a.real_width_in}
                    onChange={(e) => updateAsset(a.id, { real_width_in: parseFloat(e.target.value || "1") })} style={S.input} />
                </label>
                <label style={S.fieldLabel}>Layer
                  <select value={a.layer_class} onChange={(e) => updateAsset(a.id, { layer_class: e.target.value })} style={S.select}>
                    {LAYER_ORDER.filter((l) => l !== "base").map((l) => <option key={l} value={l}>{l}</option>)}
                  </select>
                </label>
                <label style={S.fieldLabel}>Rotation
                  <select value={a.rotation_mode} onChange={(e) => updateAsset(a.id, { rotation_mode: e.target.value })} style={S.select}>
                    <option value="camera_facing">camera facing</option>
                    <option value="tangent">tangent (foliage)</option>
                  </select>
                </label>
                <label style={S.fieldLabel}>Orientation
                  <select value={a.orient} onChange={(e) => updateAsset(a.id, { orient: e.target.value }, true)} style={S.select}>
                    {ORIENTS.map((o) => <option key={o.id} value={o.id}>{o.label}</option>)}
                  </select>
                </label>
                <label style={Object.assign({}, S.check, { fontSize: 12.5 })}>
                  <input type="checkbox" checked={a.stripWhite}
                    onChange={(e) => updateAsset(a.id, { stripWhite: e.target.checked }, true)} />
                  <span>Strip white background</span>
                </label>
                {a.rotation_mode === "tangent" && (
                  <div style={S.hint}>Tangent stems must grow toward the RIGHT after orientation.</div>
                )}
                <div style={S.row}>
                  <button onClick={() => setOpenAsset(openAsset === a.id ? null : a.id)} style={S.btnGhost}>
                    {openAsset === a.id ? "Close anchors" : "Set anchors"}
                  </button>
                  <button onClick={() => removeAsset(a.id)} style={S.btnDanger}>Remove</button>
                </div>
                {openAsset === a.id && a.prepared && (
                  <AnchorPicker asset={a} onSet={(patch) => updateAsset(a.id, patch)} />
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <footer style={S.footer}>
        AI interprets · geometry places. The Proof is deterministic and authoritative. Prompts are frozen presets under your control. Every render is seeded and logged. Keys live server-side only.
      </footer>
    </div>
  );
}

/* ═══════════ styles ═══════════ */
const S = {
  app: { minHeight: "100vh", background: "#F9F7F4", color: "#26241F", fontFamily: "'Inter', sans-serif", padding: "28px clamp(16px,4vw,56px) 48px" },
  header: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", borderBottom: "1px solid rgba(74,103,65,0.22)", paddingBottom: 18, marginBottom: 26, flexWrap: "wrap", gap: 12 },
  brand: { fontFamily: "'Cormorant Garamond', serif", fontSize: 15, letterSpacing: "0.34em", textTransform: "uppercase", color: "#4A6741", fontWeight: 600 },
  title: { fontFamily: "'Cormorant Garamond', serif", fontWeight: 500, fontSize: "clamp(28px,4vw,42px)", margin: "4px 0 0", lineHeight: 1.05, color: "#2E3F2A" },
  headerMeta: { display: "flex", gap: 10, alignItems: "center" },
  badge: { background: "#4A6741", color: "#F9F7F4", fontSize: 11, letterSpacing: "0.12em", padding: "6px 12px", borderRadius: 999, fontWeight: 500 },
  badgeOutline: { border: "1px solid #B0793F", color: "#B0793F", fontSize: 11, letterSpacing: "0.12em", padding: "5px 12px", borderRadius: 999, fontWeight: 500 },
